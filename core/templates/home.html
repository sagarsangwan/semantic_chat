{% include 'base.html' %}
{% block content %}
{% include 'components/navbar.html' %}
<div class="container-fluid h-100">
    <div class="row h-100">
        <div class="col-md-4 bg-light border-right overflow-auto h-100" id="user-list">
            <h5 class="text-center py-3">Contacts</h5>
            <ul class="list-group" id="contacts"></ul>
        </div>
        <div class="col-md-8 h-100" id="chat-box">
            <div class="card h-100">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h5 class="card-title">Chat</h5>
                    <button class="btn btn-danger" id="end-chat">End Chat</button>
                </div>
                <div class="card-body overflow-auto" id="chat-messages">
                    <div class="media mb-3">
                        <img src="https://via.placeholder.com/50" class="mr-3 rounded-circle" alt="...">
                        <div class="media-body">
                            <h5 class="mt-0">User 1</h5>
                            Hi, how are you?
                        </div>
                    </div>
                    <div class="media mb-3">
                        <div class="media-body">
                            <h5 class="mt-0">Me</h5>
                            I'm good, thanks for asking! How about you?
                        </div>
                        <img src="https://via.placeholder.com/50" class="ml-3 rounded-circle" alt="...">
                    </div>
                </div>
                <div class="card-footer">
                    <div class="input-group">
                        <input type="text" class="form-control" id="message-input"
                            placeholder="Type your message here...">
                        <div class="input-group-append">
                            <button class="btn btn-primary" id="send-message">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkf
  
  
  

{% endblock content %}
