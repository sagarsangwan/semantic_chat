{% include 'base.html' %}
<style>
    .list-wrapper {
        max-width: 400px;
        margin: 50px auto;
    }

    .list {
        background: #fff;
        border-radius: 2px;
        list-style: none;
        padding: 10px 20px;
    }

    .list-item {
        display: flex;
        margin: 10px;
        padding-bottom: 5px;
        padding-top: 5px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    .list-item:last-child {
        border-bottom: none;
    }

    .list-item-image {
        border-radius: 50%;
        width: 64px;
    }

    .list-item-content {
        margin-left: 20px;
    }

    .list-item-content h4,
    .list-item-content p {
        margin: 0;
    }

    .list-item-content h4 {
        margin-top: 10px;
        font-size: 18px;
    }

    .list-item-content p {
        margin-top: 5px;
        color: #aaa;
    }
</style>
{% block content %}
{% include 'components/navbar.html' %}


{% if all_users %}
<div class="list-wrapper" ng-app="app" ng-controller="MainCtrl as ctrl">
    <ul class="list">
        {% for user in all_users %}
        <li class="list-item">
            <div>
                <img class="list-item-image" src="{{ user.socialaccount_set.all.0.get_avatar_url|default:" /static/images/default-user-img.svg" }}" />


            </div>
            <div class="list-item-content">
                <h4>{{user.get_full_name}}</h4>
                <p>@{{user.username}}</p>
            </div>
        </li>
        {% endfor %}

    </ul>
</div>
{% else %}
<div class="container">
    <div class="row">
        <div class="col-md-12">
            <h1>Sorry, no users found.</h1>
        </div>
    </div>
</div>
{% endif %}

{% endblock %}
