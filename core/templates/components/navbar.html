<style>
  .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%280, 0, 0, 0.55%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
  }

  .img-width {
      width: 37px;
  }

  .black-navbar {
      min-height: 100px;
  }

  .black-heder {
      color: white;
  }

  @media screen and (max-width: 768px) {
      .img-width {
          width: 50px;
      }
  }

  .rounded-search-bar {
      left: 830px;
      top: 33px;
      border-radius: 7px;

  }

  .login {
      border-right: 1.3px solid rgb(80, 80, 80);
  }

  /* Mega menu */
  .dropdown-menu h6 {
      font-size: 12px;
      letter-spacing: 2.5px;
      font-weight: 400;
  }

  .dropdown-menu a {
      font-size: 16px;
      color: #FFFFFF;
      font-weight: 400;
  }

  .dropdown-menu a:hover {
      color: #0BB2AD;
  }

  .dropdown-menu li {
      line-height: 32px;
  }

  /* Search bar  */
  .cross-icon {
      transition: .4s;
      opacity: 0;
      cursor: pointer;
  }

  .search-icon {
      transition: .4s;
      cursor: pointer;
  }

  .search-box input {
      border: none;
      width: 0;
      padding: 0;
      transition: .4s;
      border-bottom: 1.8px solid rgb(96, 95, 95);
  }

  .search-box input:focus {
      outline: none;
  }

  /* Sidebar menu  */
  .sidebar .accordion .accordion-item {
      border: none;

  }

  .sidebar .accordion .accordion-button {
      box-shadow: none;
      padding-left: 30px;
      border-radius: 0 !important;
      font-size: 16px;
      letter-spacing: 3px;
  }


  .sidebar .accordion .accordion-body {
      font-size: 16px;
      padding-left: 38px;
  }

  .sidebar .accordion-body a {
      color: #FFFFFF;
      line-height: 28px;
  }

  .sidebar .accordion .accordion-button {
      box-shadow: none;
      padding-left: 30px;
      border-radius: 0 !important;
      font-size: 16px;
      border-left: none;
      letter-spacing: 3px;
  }



  .sidebar .accordion-button:not(.collapsed) {
      color: black;
      background-color: #404040;
      box-shadow: inset 0 -1px 0 rgb(0 0 0 / 13%);
  }

  .sidebar .accordion-button:not(.collapsed)::after {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23fff'%3e%3cpath fill-rule='evenodd' d='M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z'/%3e%3c/svg%3e");
  }

  .sidebar .accordion-button::after {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23fff'%3e%3cpath fill-rule='evenodd' d='M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z'/%3e%3c/svg%3e");
  }

  .navbar-login {
      padding-left: 30px;

  }

  .login-btn-navbar {
      padding: 8px 32px;
      background: #0BB2AD;
      border-radius: 8px;
  }

  .profile-mobile-logo {
      min-width: 48px;
  }

  header {
      background-color: white;
  }

  .avatar-img {
      border-radius: 50%;
      max-width: 50px;
  }
</style>
<header>
  <nav class="navbar navbar-expand-lg ">
      <div class="container-fluid">
          <a class="navbar-brand me-0" href="/">
              <img class="img-width mb-1" src="/static/images/sementic-chat-logo.png" alt="teachoo-logo">
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
              aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
              <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                  <li class="nav-item">
                      {% if user.is_authenticated %}
                      <a class="nav-link " href="/accounts/logout">
                          logout
                      </a>
                      {% endif %}
                  </li>
                  {% if user.is_authenticated and request.user.teacher_registration.date_of_registration%}
                  {% else %}
                  
                  <li class="nav-item">
                      <a class="nav-link" href="/registration/register-for-demo-class/"></a>
                  </li>
                  {% endif %}
              </ul>
              {% if request.user.is_authenticated %}
              <a class="nav-link" href="/profile">
                  <img class="avatar-img" src="
                  {{ user.socialaccount_set.all.0.get_avatar_url|default:" /static/images/default-user-img.svg" }}" />

              </a>
              {% else %}
              <a class="nav-link " href="/accounts/login">Login</a>
              
              {% endif %}
          </div>
      </div>
  </nav>
</header>
